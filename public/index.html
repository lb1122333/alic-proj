<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><meta name="robots" content="noindex, nofollow" /><title>NetLeafy Relay</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" /><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }:root {--bg: #0a0e0d;--surface: #111714;--border: #1e2e27;--accent: #0d9488;--accent2: #14b8a6;--text: #e8f5f2;--muted: #4a6b62;--glow: rgba(13, 148, 136, 0.18);}html, body {height: 100%;background: var(--bg);color: var(--text);font-family: 'Syne', sans-serif;overflow: hidden;}/* ── grid bg ── */body::before {content: '';position: fixed;inset: 0;background-image:linear-gradient(var(--border) 1px, transparent 1px),linear-gradient(90deg, var(--border) 1px, transparent 1px);background-size: 48px 48px;opacity: 0.5;pointer-events: none;z-index: 0;}/* ── radial glow ── */body::after {content: '';position: fixed;top: -20%;left: 50%;transform: translateX(-50%);width: 900px;height: 600px;background: radial-gradient(ellipse, var(--glow) 0%, transparent 65%);pointer-events: none;z-index: 0;filter: blur(40px);}.scene {position: relative;z-index: 1;height: 100dvh;display: flex;flex-direction: column;align-items: center;justify-content: center;gap: 0;padding: 24px;}/* ── animated ring ── */.ring-wrap {position: relative;width: 96px;height: 96px;margin-bottom: 40px;opacity: 0;animation: fadeUp 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;}.ring-wrap svg {width: 100%;height: 100%;animation: spin 8s linear infinite;}.ring-dot {position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);width: 20px;height: 20px;border-radius: 50%;background: var(--accent);box-shadow: 0 0 24px 6px var(--glow);animation: pulse 2s ease-in-out infinite;}@keyframes spin { to { transform: rotate(360deg); } }@keyframes pulse {0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }50%       { transform: translate(-50%,-50%) scale(1.25); opacity: 0.7; }}/* ── label ── */.label {font-family: 'Space Mono', monospace;font-size: 0.65rem;letter-spacing: 0.22em;text-transform: uppercase;color: var(--accent);margin-bottom: 18px;opacity: 0;animation: fadeUp 0.7s 0.25s cubic-bezier(0.16,1,0.3,1) forwards;}/* ── heading ── */h1 {font-size: clamp(2rem, 6vw, 3.4rem);font-weight: 800;line-height: 1.05;letter-spacing: -0.03em;text-align: center;color: var(--text);margin-bottom: 16px;opacity: 0;animation: fadeUp 0.7s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;}p {font-size: 1rem;color: var(--muted);text-align: center;max-width: 380px;line-height: 1.6;margin-bottom: 32px;opacity: 0;animation: fadeUp 0.7s 0.45s cubic-bezier(0.16,1,0.3,1) forwards;}/* ── copy field ── */.copy-wrap {display: flex;align-items: stretch;gap: 0;width: 100%;max-width: 420px;margin-bottom: 40px;border: 1.5px solid var(--border);border-radius: 12px;overflow: hidden;background: var(--surface);box-shadow: 0 0 0 0 var(--glow);transition: box-shadow 0.2s, border-color 0.2s;opacity: 0;animation: fadeUp 0.7s 0.52s cubic-bezier(0.16,1,0.3,1) forwards;}.copy-wrap:focus-within {border-color: var(--accent);box-shadow: 0 0 0 3px rgba(13,148,136,0.18);}.copy-input {flex: 1;padding: 13px 16px;background: transparent;border: none;outline: none;font-family: 'Space Mono', monospace;font-size: 0.78rem;color: var(--text);letter-spacing: 0.04em;cursor: text;user-select: all;-webkit-user-select: all;min-width: 0;}.copy-btn {padding: 0 22px;background: var(--accent);border: none;color: #fff;font-family: 'Syne', sans-serif;font-weight: 700;font-size: 0.82rem;letter-spacing: 0.04em;cursor: pointer;white-space: nowrap;transition: background 0.2s;flex-shrink: 0;align-self: stretch;}.copy-btn:hover { background: #0f766e; }.copy-btn.copied { background: #065f46; }/* ── divider ── */.divider {width: 1px;height: 40px;background: linear-gradient(to bottom, var(--border), transparent);margin-bottom: 40px;opacity: 0;animation: fadeUp 0.7s 0.58s cubic-bezier(0.16,1,0.3,1) forwards;}/* ── CTA button ── */.cta {display: inline-flex;align-items: center;gap: 10px;padding: 15px 28px;background: var(--accent);color: #fff;font-family: 'Syne', sans-serif;font-weight: 700;font-size: 0.9rem;letter-spacing: 0.02em;text-decoration: none;border-radius: 12px;box-shadow: 0 8px 32px rgba(13,148,136,0.35);transition: background 0.2s, transform 0.2s, box-shadow 0.2s;opacity: 0;animation: fadeUp 0.7s 0.65s cubic-bezier(0.16,1,0.3,1) forwards;}.cta:hover {background: #0f766e;transform: translateY(-2px);box-shadow: 0 12px 40px rgba(13,148,136,0.45);}.cta:active { transform: translateY(0); }.cta svg { width: 18px; height: 18px; flex-shrink: 0; }/* ── footer tag ── */.foot {position: fixed;bottom: 24px;font-family: 'Space Mono', monospace;font-size: 0.65rem;color: var(--muted);letter-spacing: 0.12em;opacity: 0;animation: fadeUp 0.7s 0.75s cubic-bezier(0.16,1,0.3,1) forwards;}@keyframes fadeUp {from { opacity: 0; transform: translateY(16px); }to   { opacity: 1; transform: translateY(0); }}@media (max-width: 480px) {.ring-wrap { width: 72px; height: 72px; margin-bottom: 28px; }.ring-dot { width: 14px; height: 14px; }p { margin-bottom: 24px; }.copy-wrap { max-width: 100%; }.divider { height: 28px; margin-bottom: 28px; }}</style></head><body><div class="scene"><div class="ring-wrap"><svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="48" cy="48" r="44" stroke="#1e2e27" stroke-width="1.5" stroke-dasharray="4 8" /><circle cx="48" cy="48" r="36" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6" /><circle cx="48" cy="4" r="3.5" fill="#0d9488" /></svg><div class="ring-dot"></div></div><span class="label">Relay Active</span><h1>Your Relay URL</h1><p>Copy the URL below and paste it into the config generator to get started.</p><div class="copy-wrap"><input id="relayUrl" class="copy-input" type="text" readonly value="graceful-alpaca-d3121a.netlify.app" /><button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy</button></div><div class="divider"></div><a class="cta" href="https://code-leafy.github.io/NetLeafy/" target="_blank" rel="noopener"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Open Config Generator</a></div><span class="foot">NETLEAFY · CODELEAFY</span><script>function copyUrl(){var input=document.getElementById('relayUrl');var btn=document.getElementById('copyBtn');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(input.value).then(function(){flash(btn);});}else{input.select();input.setSelectionRange(0,99999);document.execCommand('copy');flash(btn);}}function flash(btn){btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},2000);}</script></body></html>
